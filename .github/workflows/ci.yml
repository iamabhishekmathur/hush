name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build (HushCore + HushCheck + app shell)
        run: swift build

      - name: Voice-sync self-test
        run: swift run HushCheck
