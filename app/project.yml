# XcodeGen spec for the Hush macOS app bundle.
#   brew install xcodegen
#   cd app && xcodegen generate && open Hush.xcodeproj
#
# The app consumes HushCore from the local Swift package so there is a single
# source of truth for the engine; only the app-shell sources live in the target.
name: Hush
options:
  bundleIdPrefix: com.iamabhishekmathur
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  Hush:
    path: ..

targets:
  Hush:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: ../Sources/HushApp
    dependencies:
      - package: Hush
        product: HushCore
    info:
      path: Generated/Info.plist
      properties:
        CFBundleName: Hush
        CFBundleDisplayName: Hush
        LSUIElement: true   # menu-bar agent, no dock icon
        NSMicrophoneUsageDescription: "Hush listens to your voice to scroll your script in sync as you speak. Audio is processed on-device and never leaves your Mac."
        NSSpeechRecognitionUsageDescription: "Hush uses on-device speech recognition to follow your place in the script. Nothing is sent to the cloud."
    entitlements:
      path: Generated/Hush.entitlements
      properties:
        com.apple.security.device.audio-input: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.iamabhishekmathur.hush
        MARKETING_VERSION: "0.0.1"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.10"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
